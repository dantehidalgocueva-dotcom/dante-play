<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dante Play</title>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- HEADER -->
    <header class="header">
        <div class="container">
            <h1 class="logo">Dante Play</h1>
            <button class="menu-btn">☰</button>
        </div>
    </header>

    <!-- HERO -->
    <section class="hero">
        <div class="container">
            <h2>Eleva tu experiencia gamer</h2>
            <p>Encuentra los mejores videojuegos al mejor precio.</p>
            <a href="#" class="btn-primary">Explorar ahora</a>
        </div>
    </section>

    <!-- PRODUCTOS -->
    <section class="products">
        <div class="container">
            <h2 class="section-title">Destacados</h2>

            <div class="products-grid">
           <div class="product-card">
    <div class="product-image"></div>
    <h3>God of War Ragnarök</h3>
    <p class="platform">PS5</p>
    <p class="price">$69.99</p>
    <button class="btn-secondary">Agregar al carrito</button>
</div>

<div class="product-card">
    <div class="product-image"></div>
    <h3>Spider-Man 2</h3>
    <p class="platform">PS5</p>
    <p class="price">$69.99</p>
    <button class="btn-secondary">Agregar al carrito</button>
</div>

<div class="product-card">
    <div class="product-image"></div>
    <h3>The Legend of Zelda: Tears of the Kingdom</h3>
    <p class="platform">Nintendo Switch</p>
    <p class="price">$59.99</p>
    <button class="btn-secondary">Agregar al carrito</button>
</div>
</div>
        </div>
    </section>

    <!-- FOOTER -->
    <footer class="footer">
        <div class="container">
            <p>© 2026 Dante Play - Todos los derechos reservados</p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
